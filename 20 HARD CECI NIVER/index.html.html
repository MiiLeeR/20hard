
<h2 class="sr-only">Tracker do desafio 20 Hard — 18 de maio a 07 de junho</h2>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { padding: 1.5rem 0; }
.header { margin-bottom: 1.5rem; }
.header h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.header p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.875rem 1rem; }
.stat-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-value.green { color: #1D9E75; }
.stat-value.amber { color: #BA7517; }

.progress-bar-wrap { background: var(--color-background-secondary); border-radius: 100px; height: 8px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-bar-fill { height: 8px; border-radius: 100px; background: #1D9E75; transition: width 0.5s ease; }

.days-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(285px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.day-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
.day-card.today { border: 1.5px solid #1D9E75; }
.day-card.past-complete { opacity: 0.7; }
.day-card.future { opacity: 0.5; }

.day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
.day-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.day-date { font-size: 12px; color: var(--color-text-secondary); }
.day-badge { font-size: 11px; padding: 2px 8px; border-radius: 100px; font-weight: 500; }
.badge-today { background: #E1F5EE; color: #0F6E56; }
.badge-done { background: #EAF3DE; color: #3B6D11; }
.badge-miss { background: #FCEBEB; color: #A32D2D; }

.tasks-list { display: flex; flex-direction: column; gap: 6px; }
.task-item { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px 6px; border-radius: 6px; transition: background 0.15s; user-select: none; }
.task-item:hover { background: var(--color-background-secondary); }
.task-item.disabled { cursor: default; pointer-events: none; }
.task-check { width: 18px; height: 18px; border: 1.5px solid var(--color-border-secondary); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.task-check.checked { background: #1D9E75; border-color: #1D9E75; }
.task-check i { font-size: 12px; color: white; }
.task-label { font-size: 13px; color: var(--color-text-primary); }
.task-label.done { text-decoration: line-through; color: var(--color-text-secondary); }

.reset-btn { font-size: 12px; color: var(--color-text-secondary); background: none; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 6px 14px; cursor: pointer; }
.reset-btn:hover { background: var(--color-background-secondary); }
</style>

<div class="app">
  <div class="header">
    <h1>20 Hard Challenge <span style="color:#1D9E75">💪</span></h1>
    <p>18 de maio → 07 de junho · 5 tarefas por dia</p>
  </div>

  <div class="stats-grid" id="statsGrid"></div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  <div class="days-grid" id="daysGrid"></div>

  <button class="reset-btn" onclick="resetAll()">Reiniciar tudo</button>
</div>

<script>
const START = new Date(2025, 4, 18);
const END   = new Date(2025, 5, 7);
const TOTAL = 20;

const TASKS = [
  { id:'t1', icon:'ti-run', label:'Treino 1 — 45 min' },
  { id:'t2', icon:'ti-swim', label:'Treino 2 — 45 min (ao ar livre)' },
  { id:'t3', icon:'ti-book', label:'Ler 10 páginas' },
  { id:'t4', icon:'ti-droplet', label:'4 litros de água' },
  { id:'t5', icon:'ti-salad', label:'Dieta sem desvios' },
];

function getKey(dayIndex){ return 'h20_day_' + dayIndex; }
function loadDay(i){ try{ return JSON.parse(localStorage.getItem(getKey(i))) || {}; } catch(e){ return {}; } }
function saveDay(i, data){ localStorage.setItem(getKey(i), JSON.stringify(data)); }

function getDayDate(i){
  const d = new Date(START);
  d.setDate(d.getDate() + i);
  return d;
}

function formatDate(d){
  return d.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'});
}

function isToday(d){
  const now = new Date();
  return d.getDate()===now.getDate() && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
}

function isPast(d){
  const now = new Date(); now.setHours(0,0,0,0);
  const dd = new Date(d); dd.setHours(0,0,0,0);
  return dd < now;
}

function isFuture(d){
  const now = new Date(); now.setHours(0,0,0,0);
  const dd = new Date(d); dd.setHours(0,0,0,0);
  return dd > now;
}

function dayComplete(data){
  return TASKS.every(t => data[t.id]);
}

function toggle(dayIndex, taskId){
  const d = getDayDate(dayIndex);
  if(isFuture(d)) return;
  const data = loadDay(dayIndex);
  data[taskId] = !data[taskId];
  saveDay(dayIndex, data);
  render();
}

function resetAll(){
  if(!confirm('Tem certeza? Todos os dados serão apagados.')) return;
  for(let i=0;i<TOTAL;i++) localStorage.removeItem(getKey(i));
  render();
}

function render(){
  const grid = document.getElementById('daysGrid');
  const stats = document.getElementById('statsGrid');
  const bar   = document.getElementById('progressBar');

  let completeDays = 0, totalChecked = 0;
  const now = new Date(); now.setHours(0,0,0,0);
  const daysPassed = Math.max(0, Math.floor((now - START) / 86400000) + 1);

  const cards = [];
  for(let i=0;i<TOTAL;i++){
    const d = getDayDate(i);
    const data = loadDay(i);
    const past = isPast(d), today = isToday(d), future = isFuture(d);
    const complete = dayComplete(data);
    const checked = TASKS.filter(t=>data[t.id]).length;
    if(!future) totalChecked += checked;
    if(!future && complete) completeDays++;

    let cls = 'day-card';
    if(today) cls += ' today';
    else if(past && complete) cls += ' past-complete';
    else if(future) cls += ' future';

    let badge = '';
    if(today) badge = '<span class="day-badge badge-today">hoje</span>';
    else if(!future && complete) badge = '<span class="day-badge badge-done"><i class="ti ti-check"></i> completo</span>';
    else if(past && !complete) badge = '<span class="day-badge badge-miss">incompleto</span>';

    const taskItems = TASKS.map(t => {
      const done = !!data[t.id];
      const dis  = future ? ' disabled' : '';
      return `<div class="task-item${dis}" onclick="toggle(${i},'${t.id}')">
        <div class="task-check${done?' checked':''}"><i class="ti ti-check" aria-hidden="true"></i></div>
        <span class="task-label${done?' done':''}"><i class="ti ${t.icon}" style="font-size:14px;margin-right:4px;vertical-align:-1px" aria-hidden="true"></i>${t.label}</span>
      </div>`;
    }).join('');

    cards.push(`<div class="${cls}">
      <div class="day-header">
        <div>
          <div class="day-title">Dia ${i+1}</div>
          <div class="day-date">${formatDate(d)}</div>
        </div>
        ${badge}
      </div>
      <div class="tasks-list">${taskItems}</div>
    </div>`);
  }

  grid.innerHTML = cards.join('');

  const pct = Math.round((completeDays/TOTAL)*100);
  bar.style.width = pct + '%';

  const daysLeft = Math.max(0, TOTAL - Math.floor((now - START)/86400000) - 1);
  const streak = calcStreak();

  stats.innerHTML = `
    <div class="stat-card"><div class="stat-label">Dias completos</div><div class="stat-value green">${completeDays}/${TOTAL}</div></div>
    <div class="stat-card"><div class="stat-label">Progresso</div><div class="stat-value">${pct}%</div></div>
    <div class="stat-card"><div class="stat-label">Sequência atual</div><div class="stat-value amber">${streak} 🔥</div></div>
    <div class="stat-card"><div class="stat-label">Dias restantes</div><div class="stat-value">${daysLeft}</div></div>
  `;
}

function calcStreak(){
  let streak = 0;
  const now = new Date(); now.setHours(0,0,0,0);
  for(let i=TOTAL-1;i>=0;i--){
    const d = getDayDate(i);
    if(isFuture(d)) continue;
    if(dayComplete(loadDay(i))) streak++;
    else break;
  }
  return streak;
}

render();
</script>
