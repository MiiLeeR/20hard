<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20 Hard — Ceci Niver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE7;
    --border: #E2DDD6;
    --text: #1A1714;
    --muted: #8A8480;
    --green: #1D9E75;
    --green-bg: #E1F5EE;
    --green-text: #0F6E56;
    --amber: #BA7517;
    --amber-bg: #FAEEDA;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  .hero {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 28px 20px 24px;
    text-align: center;
  }
  .hero-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--green-text);
    background: var(--green-bg);
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 12px;
  }
  .hero h1 {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }
  .hero h1 span { color: var(--green); }
  .hero p {
    margin-top: 6px;
    font-size: 14px;
    color: var(--muted);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 20px 16px 0;
    max-width: 520px;
    margin: 0 auto;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
  }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--text); }
  .stat-value.g { color: var(--green); }
  .stat-value.a { color: var(--amber); }

  .progress-wrap {
    max-width: 520px;
    margin: 16px auto 0;
    padding: 0 16px;
  }
  .progress-track {
    background: var(--border);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 6px;
    border-radius: 100px;
    background: var(--green);
    transition: width 0.5s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 20px 16px 10px;
    max-width: 520px;
    margin: 0 auto;
  }

  .days-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 16px;
    max-width: 520px;
    margin: 0 auto;
  }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .day-card.is-today { border-color: var(--green); border-width: 2px; }
  .day-card.is-future { opacity: 0.45; }

  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    gap: 12px;
    -webkit-tap-highlight-color: transparent;
  }
  .day-header:active { background: var(--surface2); }

  .day-info { flex: 1; }
  .day-num { font-size: 15px; font-weight: 600; color: var(--text); }
  .day-date { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .day-right { display: flex; align-items: center; gap: 10px; }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
  }
  .badge-today { background: var(--green-bg); color: var(--green-text); }
  .badge-done { background: #EAF3DE; color: #3B6D11; }
  .badge-miss { background: var(--red-bg); color: var(--red); }

  .day-mini-dots {
    display: flex;
    gap: 3px;
  }
  .mini-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
  }
  .mini-dot.on { background: var(--green); }

  .chevron {
    font-size: 16px;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .day-card.open .chevron { transform: rotate(180deg); }

  .day-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 12px 16px;
  }
  .day-card.open .day-body { display: block; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .task-item:active { background: var(--surface2); }
  .task-item.locked { cursor: default; pointer-events: none; }

  .task-check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 13px;
  }
  .task-check.checked {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  .task-text { font-size: 14px; color: var(--text); }
  .task-text.done { text-decoration: line-through; color: var(--muted); }

  .footer {
    max-width: 520px;
    margin: 24px auto 0;
    padding: 0 16px;
    text-align: center;
  }
  .reset-btn {
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 20px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .reset-btn:hover { background: var(--surface); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">20 Hard Challenge</div>
  <h1>Bora, <span>Ceci</span>! 💪</h1>
  <p>18 de maio → 07 de junho · 5 tarefas por dia</p>
</div>

<div class="stats" id="statsGrid"></div>

<div class="progress-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label">
    <span>Progresso</span>
    <span id="progressLabel">0%</span>
  </div>
</div>

<div class="section-title">Dias</div>
<div class="days-list" id="daysList"></div>

<div class="footer">
  <button class="reset-btn" onclick="resetAll()">Reiniciar tudo</button>
</div>

<script>
const TOTAL = 20;
const START = new Date(2025, 4, 18); // 18 maio 2025

const TASKS = [
  { id:'t1', emoji:'🏋️', label:'Treino 1 — 45 min' },
  { id:'t2', emoji:'🌳', label:'Treino 2 — 45 min (ao ar livre)' },
  { id:'t3', emoji:'📖', label:'Ler 10 páginas' },
  { id:'t4', emoji:'💧', label:'4 litros de água' },
  { id:'t5', emoji:'🥗', label:'Dieta sem desvios' },
];

const WEEKDAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS   = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

function getDayDate(i) {
  const d = new Date(START);
  d.setDate(d.getDate() + i);
  return d;
}
function formatDate(d) {
  return WEEKDAYS[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS[d.getMonth()];
}
function isToday(d) {
  const n = new Date();
  return d.getDate()===n.getDate() && d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
}
function isFuture(d) {
  const n = new Date(); n.setHours(0,0,0,0);
  const dd = new Date(d); dd.setHours(0,0,0,0);
  return dd > n;
}
function isPast(d) {
  const n = new Date(); n.setHours(0,0,0,0);
  const dd = new Date(d); dd.setHours(0,0,0,0);
  return dd < n;
}
function loadDay(i) {
  try { return JSON.parse(localStorage.getItem('h20_d_'+i)) || {}; } catch(e) { return {}; }
}
function saveDay(i, data) {
  localStorage.setItem('h20_d_'+i, JSON.stringify(data));
}
function dayComplete(data) {
  return TASKS.every(t => data[t.id]);
}
function calcStreak() {
  let s = 0;
  for(let i = TOTAL-1; i >= 0; i--) {
    const d = getDayDate(i);
    if(isFuture(d)) continue;
    if(dayComplete(loadDay(i))) s++;
    else break;
  }
  return s;
}

let openDay = null;

function toggle(dayIndex, taskId) {
  const d = getDayDate(dayIndex);
  if(isFuture(d)) return;
  const data = loadDay(dayIndex);
  data[taskId] = !data[taskId];
  saveDay(dayIndex, data);
  render();
  // reopen same card
  openDay = dayIndex;
  const card = document.querySelector('[data-day="'+dayIndex+'"]');
  if(card) card.classList.add('open');
}

function toggleDay(i) {
  const card = document.querySelector('[data-day="'+i+'"]');
  if(!card) return;
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.day-card.open').forEach(c => c.classList.remove('open'));
  if(!wasOpen) { card.classList.add('open'); openDay = i; }
  else { openDay = null; }
}

function resetAll() {
  if(!confirm('Apagar todo o progresso?')) return;
  for(let i=0;i<TOTAL;i++) localStorage.removeItem('h20_d_'+i);
  openDay = null;
  render();
}

function render() {
  const now = new Date(); now.setHours(0,0,0,0);
  let completeDays = 0;

  const list = document.getElementById('daysList');
  list.innerHTML = '';

  for(let i = 0; i < TOTAL; i++) {
    const d = getDayDate(i);
    const data = loadDay(i);
    const today = isToday(d);
    const future = isFuture(d);
    const past = isPast(d);
    const complete = dayComplete(data);
    const checkedCount = TASKS.filter(t => data[t.id]).length;

    if(!future && complete) completeDays++;

    // card class
    let cls = 'day-card';
    if(today) cls += ' is-today';
    if(future) cls += ' is-future';
    if(openDay === i) cls += ' open';

    // badge
    let badge = '';
    if(today) badge = '<span class="badge badge-today">hoje</span>';
    else if(!future && complete) badge = '<span class="badge badge-done">✓ completo</span>';
    else if(past && !complete) badge = '<span class="badge badge-miss">incompleto</span>';

    // mini dots
    const dots = TASKS.map(t =>
      `<div class="mini-dot${data[t.id]?' on':''}"></div>`
    ).join('');

    // tasks
    const taskRows = TASKS.map(t => {
      const done = !!data[t.id];
      const lockedCls = future ? ' locked' : '';
      return `<div class="task-item${lockedCls}" onclick="toggle(${i},'${t.id}')">
        <div class="task-check${done?' checked':''}">${done?'✓':''}</div>
        <span class="task-text${done?' done':''}">${t.emoji} ${t.label}</span>
      </div>`;
    }).join('');

    list.innerHTML += `<div class="${cls}" data-day="${i}">
      <div class="day-header" onclick="toggleDay(${i})">
        <div class="day-info">
          <div class="day-num">Dia ${i+1}</div>
          <div class="day-date">${formatDate(d)}</div>
        </div>
        <div class="day-right">
          ${badge}
          <div class="day-mini-dots">${dots}</div>
          <div class="chevron">▾</div>
        </div>
      </div>
      <div class="day-body">${taskRows}</div>
    </div>`;
  }

  // stats
  const pct = Math.round((completeDays / TOTAL) * 100);
  const daysLeft = Math.max(0, TOTAL - Math.floor((now - START) / 86400000) - 1);
  const streak = calcStreak();

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat"><div class="stat-label">Dias completos</div><div class="stat-value g">${completeDays}/${TOTAL}</div></div>
    <div class="stat"><div class="stat-label">Progresso</div><div class="stat-value">${pct}%</div></div>
    <div class="stat"><div class="stat-label">Sequência 🔥</div><div class="stat-value a">${streak} dias</div></div>
    <div class="stat"><div class="stat-label">Dias restantes</div><div class="stat-value">${daysLeft}</div></div>
  `;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';

  // auto-open today
  if(openDay === null) {
    for(let i=0;i<TOTAL;i++) {
      if(isToday(getDayDate(i))) {
        const card = document.querySelector('[data-day="'+i+'"]');
        if(card) { card.classList.add('open'); openDay = i; }
        break;
      }
    }
  }
}

render();
</script>
</body>
</html>
