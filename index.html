<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20 Hard — Ceci Niver</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F5F0; --surface: #FFFFFF; --surface2: #F0EDE7; --border: #E2DDD6;
  --text: #1A1714; --muted: #8A8480; --green: #1D9E75; --green-bg: #E1F5EE;
  --green-text: #0F6E56; --amber: #BA7517; --red: #A32D2D; --red-bg: #FCEBEB;
  --radius: 12px; --radius-sm: 8px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }

.hero { background: var(--surface); border-bottom: 1px solid var(--border); padding: 28px 20px 22px; text-align: center; }
.hero-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--green-text); background: var(--green-bg); padding: 4px 12px; border-radius: 100px; margin-bottom: 12px; }
.hero h1 { font-size: 26px; font-weight: 600; }
.hero h1 span { color: var(--green); }
.hero p { margin-top: 6px; font-size: 14px; color: var(--muted); }

.sync-bar { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; color: var(--muted); padding: 7px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: background 0.3s; }
.sync-dot.ok { background: var(--green); }
.sync-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

.stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; padding: 16px 16px 0; max-width: 520px; margin: 0 auto; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; }
.stat-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 600; }
.stat-value.g { color: var(--green); }
.stat-value.a { color: var(--amber); }

.progress-wrap { max-width: 520px; margin: 14px auto 0; padding: 0 16px; }
.progress-track { background: var(--border); border-radius: 100px; height: 6px; overflow: hidden; }
.progress-fill { height: 6px; border-radius: 100px; background: var(--green); transition: width 0.5s; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 5px; }

.section-title { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); padding: 18px 16px 8px; max-width: 520px; margin: 0 auto; }

.days-list { display: flex; flex-direction: column; gap: 8px; padding: 0 16px; max-width: 520px; margin: 0 auto; }

.day-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.day-card.is-today { border-color: var(--green); border-width: 2px; }
.day-card.is-future { opacity: 0.4; pointer-events: none; }

.day-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; cursor: pointer; gap: 10px; -webkit-tap-highlight-color: transparent; }
.day-header:active { background: var(--surface2); }
.day-num { font-size: 15px; font-weight: 600; }
.day-date { font-size: 12px; color: var(--muted); margin-top: 1px; }
.day-right { display: flex; align-items: center; gap: 8px; }

.badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 100px; }
.badge-today { background: var(--green-bg); color: var(--green-text); }
.badge-done { background: #EAF3DE; color: #3B6D11; }
.badge-miss { background: var(--red-bg); color: var(--red); }

.mini-dots { display: flex; gap: 3px; }
.mini-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
.mini-dot.on { background: var(--green); }
.chevron { font-size: 14px; color: var(--muted); transition: transform 0.2s; }
.day-card.open .chevron { transform: rotate(180deg); }

.day-body { display: none; border-top: 1px solid var(--border); padding: 12px 16px 16px; }
.day-card.open .day-body { display: block; }

.task-item { display: flex; align-items: center; gap: 12px; padding: 9px 6px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.12s; -webkit-tap-highlight-color: transparent; user-select: none; }
.task-item:active { background: var(--surface2); }
.task-check { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; transition: all 0.15s; }
.task-check.checked { background: var(--green); border-color: var(--green); color: white; }
.task-text { font-size: 14px; }
.task-text.done { text-decoration: line-through; color: var(--muted); }

/* PESO DENTRO DO CARD */
.peso-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.peso-section-label { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.peso-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.peso-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
.peso-input-wrap { display: flex; align-items: center; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; background: var(--surface2); }
.peso-input { flex: 1; border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; padding: 9px 10px; color: var(--text); outline: none; width: 100%; min-width: 0; }
.peso-unit { font-size: 12px; color: var(--muted); padding-right: 10px; flex-shrink: 0; }
.peso-btn { width: 100%; background: var(--green); color: white; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 10px; cursor: pointer; transition: opacity 0.15s; }
.peso-btn:active { opacity: 0.8; }
.peso-saved { margin-top: 8px; font-size: 13px; color: var(--muted); text-align: center; }
.peso-saved strong { color: var(--text); font-weight: 600; }

.footer { max-width: 520px; margin: 20px auto 0; padding: 0 16px; text-align: center; }
.reset-btn { font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 20px; cursor: pointer; }
.reset-btn:hover { background: var(--surface); }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1A1714; color: white; font-size: 13px; padding: 10px 20px; border-radius: 100px; transition: transform 0.3s; z-index: 999; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">20 Hard Challenge</div>
  <h1>Bora, <span>Ceci</span>! 💪</h1>
  <p>18 de maio → 07 de junho · salvo na nuvem ☁️</p>
</div>

<div class="sync-bar">
  <div class="sync-dot loading" id="syncDot"></div>
  <span id="syncText">Conectando...</span>
</div>

<div class="stats" id="statsGrid"></div>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label"><span>Progresso geral</span><span id="progressLabel">0%</span></div>
</div>

<div class="section-title">📅 Dias do desafio</div>
<div class="days-list" id="daysList"></div>

<div class="footer">
  <button class="reset-btn" onclick="resetAll()">⚠️ Reiniciar tudo</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://qbnivadqjyvhjlxcgbwt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFibml2YWRxanl2aGpseGNnYnd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzg3MDMsImV4cCI6MjA5NDY1NDcwM30.l_LFXqN4qrghzN3Z_Nc8isfcLG2PmNkZVCI0PoYKNmQ';
const USER_ID = 'ceci_niver';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TOTAL = 20;
const START = new Date(2025, 4, 18);
const WEEKDAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const TASKS = [
  { id:'t1', emoji:'🏋️', label:'Treino 1 — 45 min' },
  { id:'t2', emoji:'🌳', label:'Treino 2 — 45 min (ao ar livre)' },
  { id:'t3', emoji:'📖', label:'Ler 10 páginas' },
  { id:'t4', emoji:'💧', label:'4 litros de água' },
  { id:'t5', emoji:'🥗', label:'Dieta sem desvios' },
];

let dbData = {};   // { dayIndex: { t1:bool, ..., manha: float, noite: float } }
let openDay = null;

// ── DB ─────────────────────────────────────────────────────────

async function loadFromDB() {
  setSyncStatus('loading', 'Carregando...');
  try {
    const { data, error } = await sb.from('tasks').select('*').eq('user_id', USER_ID);
    if(error) throw error;
    dbData = {};
    (data || []).forEach(r => { dbData[r.day_index] = r.checks || {}; });
    setSyncStatus('ok', 'Sincronizado ✓');
  } catch(e) {
    setSyncStatus('error', 'Erro — crie a tabela no Supabase');
    console.error(e);
    console.info('SQL:\nCREATE TABLE tasks (\n  id bigserial primary key,\n  user_id text,\n  day_index int,\n  checks jsonb,\n  updated_at timestamptz,\n  UNIQUE(user_id, day_index)\n);');
  }
  render();
  autoOpenToday();
}

async function saveToDB(dayIndex) {
  setSyncStatus('loading', 'Salvando...');
  try {
    const { error } = await sb.from('tasks').upsert({
      user_id: USER_ID,
      day_index: dayIndex,
      checks: dbData[dayIndex] || {},
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id,day_index' });
    if(error) throw error;
    setSyncStatus('ok', 'Salvo ✓');
  } catch(e) {
    setSyncStatus('error', 'Erro ao salvar');
  }
}

// ── ACTIONS ────────────────────────────────────────────────────

async function toggleTask(dayIndex, taskId) {
  if(isFuture(getDayDate(dayIndex))) return;
  if(!dbData[dayIndex]) dbData[dayIndex] = {};
  dbData[dayIndex][taskId] = !dbData[dayIndex][taskId];
  openDay = dayIndex;
  render();
  await saveToDB(dayIndex);
  if(TASKS.every(t => dbData[dayIndex][t.id])) showToast('Dia completo! 🎉');
}

async function savePesoDia(dayIndex) {
  const manha = parseFloat(document.getElementById('pm_'+dayIndex).value) || null;
  const noite  = parseFloat(document.getElementById('pn_'+dayIndex).value) || null;
  if(!manha && !noite) { showToast('Digite ao menos um valor!'); return; }
  if(!dbData[dayIndex]) dbData[dayIndex] = {};
  if(manha) dbData[dayIndex].manha = manha;
  if(noite)  dbData[dayIndex].noite  = noite;
  openDay = dayIndex;
  render();
  await saveToDB(dayIndex);
  showToast('Peso salvo! ⚖️');
}

async function resetAll() {
  if(!confirm('Apagar TODO o progresso? Não tem volta!')) return;
  try {
    await sb.from('tasks').delete().eq('user_id', USER_ID);
    dbData = {}; openDay = null;
    showToast('Dados apagados');
    render();
    setSyncStatus('ok', 'Sincronizado ✓');
  } catch(e) { showToast('Erro ao apagar'); }
}

// ── RENDER ─────────────────────────────────────────────────────

function render() {
  const now = new Date(); now.setHours(0,0,0,0);
  let completeDays = 0;
  const list = document.getElementById('daysList');
  list.innerHTML = '';

  for(let i=0; i<TOTAL; i++) {
    const d = getDayDate(i);
    const data = dbData[i] || {};
    const today = isToday(d), future = isFuture(d), past = isPast(d);
    const complete = TASKS.every(t => data[t.id]);
    if(!future && complete) completeDays++;

    let cls = 'day-card';
    if(today) cls += ' is-today';
    if(future) cls += ' is-future';
    if(openDay === i) cls += ' open';

    let badge = '';
    if(today) badge = '<span class="badge badge-today">hoje</span>';
    else if(!future && complete) badge = '<span class="badge badge-done">✓ completo</span>';
    else if(past && !complete) badge = '<span class="badge badge-miss">incompleto</span>';

    const dots = TASKS.map(t => `<div class="mini-dot${data[t.id]?' on':''}"></div>`).join('');

    const taskRows = TASKS.map(t => {
      const done = !!data[t.id];
      return `<div class="task-item" onclick="toggleTask(${i},'${t.id}')">
        <div class="task-check${done?' checked':''}">${done?'✓':''}</div>
        <span class="task-text${done?' done':''}">${t.emoji} ${t.label}</span>
      </div>`;
    }).join('');

    // peso já salvo
    let pesoSalvo = '';
    if(data.manha || data.noite) {
      const parts = [];
      if(data.manha) parts.push(`🌅 <strong>${data.manha} kg</strong>`);
      if(data.noite)  parts.push(`🌙 <strong>${data.noite} kg</strong>`);
      pesoSalvo = `<div class="peso-saved">${parts.join(' &nbsp;·&nbsp; ')}</div>`;
    }

    const pesoSection = `
      <div class="peso-section">
        <div class="peso-section-label">⚖️ Peso do dia</div>
        <div class="peso-row">
          <div class="peso-field">
            <label>🌅 Manhã</label>
            <div class="peso-input-wrap">
              <input class="peso-input" type="number" step="0.1" id="pm_${i}" placeholder="0.0" value="${data.manha||''}">
              <span class="peso-unit">kg</span>
            </div>
          </div>
          <div class="peso-field">
            <label>🌙 Noite</label>
            <div class="peso-input-wrap">
              <input class="peso-input" type="number" step="0.1" id="pn_${i}" placeholder="0.0" value="${data.noite||''}">
              <span class="peso-unit">kg</span>
            </div>
          </div>
        </div>
        <button class="peso-btn" onclick="savePesoDia(${i})">Salvar peso</button>
        ${pesoSalvo}
      </div>`;

    list.innerHTML += `<div class="${cls}" data-day="${i}">
      <div class="day-header" onclick="toggleOpenDay(${i})">
        <div><div class="day-num">Dia ${i+1}</div><div class="day-date">${formatDate(d)}</div></div>
        <div class="day-right">${badge}<div class="mini-dots">${dots}</div><div class="chevron">▾</div></div>
      </div>
      <div class="day-body">
        ${taskRows}
        ${pesoSection}
      </div>
    </div>`;
  }

  const pct = Math.round((completeDays/TOTAL)*100);
  const daysLeft = Math.max(0, TOTAL - Math.floor((now-START)/86400000) - 1);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat"><div class="stat-label">Dias completos</div><div class="stat-value g">${completeDays}/${TOTAL}</div></div>
    <div class="stat"><div class="stat-label">Progresso</div><div class="stat-value">${pct}%</div></div>
    <div class="stat"><div class="stat-label">Sequência 🔥</div><div class="stat-value a">${calcStreak()} dias</div></div>
    <div class="stat"><div class="stat-label">Dias restantes</div><div class="stat-value">${daysLeft}</div></div>
  `;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = pct+'%';

  if(openDay !== null) {
    const card = document.querySelector('[data-day="'+openDay+'"]');
    if(card) card.classList.add('open');
  }
}

function toggleOpenDay(i) {
  const card = document.querySelector('[data-day="'+i+'"]');
  if(!card) return;
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.day-card.open').forEach(c => c.classList.remove('open'));
  openDay = wasOpen ? null : i;
  if(!wasOpen) card.classList.add('open');
}

function autoOpenToday() {
  for(let i=0;i<TOTAL;i++) { if(isToday(getDayDate(i))) { openDay=i; render(); break; } }
}

// ── UTILS ──────────────────────────────────────────────────────

function getDayDate(i) { const d=new Date(START); d.setDate(d.getDate()+i); return d; }
function formatDate(d) { return WEEKDAYS[d.getDay()]+', '+d.getDate()+' '+MONTHS[d.getMonth()]; }
function isToday(d) { const n=new Date(); return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); }
function isFuture(d) { const n=new Date(); n.setHours(0,0,0,0); const dd=new Date(d); dd.setHours(0,0,0,0); return dd>n; }
function isPast(d) { const n=new Date(); n.setHours(0,0,0,0); const dd=new Date(d); dd.setHours(0,0,0,0); return dd<n; }
function calcStreak() {
  let s=0;
  for(let i=TOTAL-1;i>=0;i--) { const d=getDayDate(i); if(isFuture(d)) continue; if(TASKS.every(t=>(dbData[i]||{})[t.id])) s++; else break; }
  return s;
}
function setSyncStatus(state, text) {
  document.getElementById('syncDot').className='sync-dot '+state;
  document.getElementById('syncText').textContent=text;
}
let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

loadFromDB();
</script>
</body>
</html>
